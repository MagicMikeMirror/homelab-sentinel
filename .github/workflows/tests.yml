name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Compile
        run: python -m compileall -q app tests
      - name: Test
        run: pytest -q
      - name: Verify application version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          python -c "from app.main import app; assert app.version == '$version'"
      - name: Check conflict markers
        run: "! grep -RInE '<<<<<<<|=======|>>>>>>>' --exclude-dir=.git ."
