name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.6.0"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ inputs.version }}"
          current="$(tr -d '[:space:]' < VERSION)"
          [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid semantic version: $requested"; exit 1; }
          [[ "$requested" == "$current" ]] || { echo "Requested version $requested does not match VERSION $current"; exit 1; }
          grep -Fq "## [$requested]" CHANGELOG.md || { echo "CHANGELOG entry missing for $requested"; exit 1; }
          grep -Fq "$requested" README.md || { echo "README version reference missing for $requested"; exit 1; }

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt pytest

      - name: Run release checks
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q app
          python -m pytest -q
          python -c "from app.main import app; assert app.version == '${{ inputs.version }}'"
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- . ':!.github/workflows/*'; then
            echo "Conflict marker found"
            exit 1
          fi

      - name: Prepare lowercase image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/homelab-sentinel-app" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ inputs.version }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Homelab Sentinel $tag"
          git push origin "$tag"
          awk -v version="${{ inputs.version }}" '
            $0 == "## [" version "]" {capture=1; next}
            capture && /^## \[/ {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || { echo "Release notes are empty"; exit 1; }
          gh release create "$tag" --title "Homelab Sentinel $tag" --notes-file release-notes.md --verify-tag
