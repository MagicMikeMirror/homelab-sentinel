name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.5.0"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ inputs.version }}"
          current="$(tr -d '[:space:]' < VERSION)"
          if [[ "$requested" != "$current" ]]; then
            echo "Requested version $requested does not match VERSION file $current"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-sentinel-app:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/homelab-sentinel-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Homelab Sentinel $tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "Homelab Sentinel $tag" \
            --notes-file CHANGELOG.md \
            --verify-tag
